# Required when using verl.utils.omega_conf_to_dataclass to instantiate dataclass configs
_target_: verl.workers.config.MindSpeedEngineConfig

  # mindspeed_megatron or mindspeed_fsdp
strategy: mindspeed_fsdp

# should be supported model name
model_name: qwen3.5-27b

# mindspeed_megatron backend config
mcore_kwargs:
  # llm model config
  use_mcore_models: true
  spec: []
  qk_layernorm: true
  position_embedding_type: rope
  normalization: RMSNorm
  disable_bias_linear: true
  swiglu: true
  attention_softmax_in_fp32: true  
  no_gradient_accumulation_fusion: true
  group_query_attention: true

  # only support transformer_engine for now
  transformer_impl: transformer_engine

  no_pad_to_seq_lengths: true
  reset_attention_mask: true
  context_parallel_algo: ulysses_cp_algo
  attention_mask_type: general

  # llm optimizer config
  use_flash_attn: true
  use_fused_rotary_pos_emb: true
  sequence_parallel: true
  use_rotary_position_embeddings: true
  use_fused_swiglu: true
  use_fused_rmsnorm: true
  no_masked_softmax_fusion: true
  use_distributed_optimizer: true

  # llm train config
  seq_length: 10240
  micro_batch_size: 1
  initial_loss_scale: 4096
  init_method_std: 0.01
  hidden_dropout: 0.0

# mindspeed_fsdp backend config
fsdp_kwargs:
  parallel:
    tensor_parallel_size: 1
    fully_shard_parallel_size: auto
    fsdp_plan:
      param_dtype: bf16
      reduce_dtype: fp32
    ulysses_parallel_size: 1 # when open ulysses-cp, please set attn_implementation: flash_attention_2

  model:
    trust_remote_code: true
    attn_implementation: sdpa
    loss_cfg:
      loss_type: default   # If you want raw loss in model, loss_type can be set to "raw".
      router_aux_loss_coef: 0.0
    enable_chunk_loss: false
    chunkloss_plan:
      apply_module: lm_head
      chunk_size: 1024

  training:
    micro_batch_size: 1
    gradient_accumulation_steps: 1
    init_model_with_meta_device: true
    adam_fused: true
    no_load_optim: true  # Do not load optimizer state; remove if loading is needed.
    no_load_rng: true  # Do not load RNG state; remove if loading is needed.
    no_save_optim: true  # Do not save optimizer state; remove if saving is needed.
    no_save_rng: true  # Do not save RNG state; remove if saving is needed.
    use_deter_comp: false
    load_rank0_and_broadcast: true

